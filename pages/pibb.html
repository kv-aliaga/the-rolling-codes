<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pibb.css">
    <title>Pibbles</title>   
</head>
<body>

    <h1>Pibbles</h1>
    <p>I am pibble, wash my belly!</p>

    <div class="top-pibbles">
        <figure class="dog-card">
            <img src="assets/images/pibble.jpg" alt="Pibble">
            <figcaption>Pibble</figcaption>
        </figure>

        <figure class="dog-card">
            <img src="assets/images/pibble2jpg.jpg" alt="Pibbs">
            <figcaption>Pibbs</figcaption>
        </figure>

        <figure class="dog-card">
            <img src="assets/images/pibble3.jpg" alt="Another pibble">
            <figcaption>Another pibble</figcaption>
        </figure>
    </div>

    <hr>

    <h1>My favorite Pibbles</h1>

    <div class="favorites">
        <figure class="dog-card">
            <img src="assets/images/washington.png" alt="Washington pibble">
            <figcaption>Washington pibble</figcaption>
        </figure>

        <figure class="dog-card">
            <img src="assets/images/burger.jpg" alt="Burger gmail">
            <figcaption>Burger gmail</figcaption>
        </figure>

        <figure class="dog-card">
            <img src="assets/images/gmail.jpg" alt="gmail">
            <figcaption>gmail</figcaption>
        </figure>
    </div>

<hr>

<h1>My Dawgs</h1>

<div class="dawgs">

    <div class="dawg-group">
        <h3>Luke</h3>
        <div class="dawg-photos">
            <figure class="dog-card">
                <img src="assets/images/luke1.jpeg" alt="Dawg one photo 1">
                <figcaption>Luke 1</figcaption>
            </figure>

            <figure class="dog-card">
                <img src="assets/images/luke2.jpeg" alt="Dawg one photo 2">
                <figcaption>Luke 2</figcaption>
            </figure>
        </div>
    </div>

    <div class="dawg-group">
        <h3>Scooby</h3>
        <div class="dawg-photos">
            <figure class="dog-card">
                <img src="assets/images/scooby1.jpeg" alt="Dawg two photo 1">
                <figcaption>Scooby 1</figcaption>
            </figure>

            <figure class="dog-card">
                <img src="assets/images/scooby2.jpeg" alt="Dawg two photo 2">
                <figcaption>Scooby 2</figcaption>
            </figure>
        </div>
    </div>

</div>

<h2>Together 🐶🐶</h2>

<div class="together">
    <figure class="dog-card">
        <img src="assets/images/2.jpeg" alt="My dawgs together">
        <figcaption>My dawgs together</figcaption>
    </figure>
</div>

</body>
</html>
